<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Name Rater</title>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Export variables globally so other scripts can use them
        window.firebaseApp = null;
        window.db = null;
        window.firebaseModules = { doc, getDoc, setDoc, collection, getDocs };

        // Fetch config from our Vercel Serverless Function
        async function fetchConfigAndInitFirebase() {
            try {
                const res = await fetch('/api/config');
                const configStr = await res.json();

                if (!configStr.FIREBASE_API_KEY) {
                    console.error("Firebase is not configured in backend/environment variables.");
                    return;
                }

                const firebaseConfig = {
                    apiKey: configStr.FIREBASE_API_KEY,
                    authDomain: configStr.FIREBASE_AUTH_DOMAIN,
                    projectId: configStr.FIREBASE_PROJECT_ID,
                    storageBucket: configStr.FIREBASE_STORAGE_BUCKET,
                    messagingSenderId: configStr.FIREBASE_MESSAGING_SENDER_ID,
                    appId: configStr.FIREBASE_APP_ID
                };

                window.firebaseApp = initializeApp(firebaseConfig);
                window.db = getFirestore(window.firebaseApp);
                console.log("Firebase initialized successfully.");
            } catch (e) {
                console.error("Failed to fetch Firebase config:", e);
            }
        }

        // Initialize Firebase on load
        fetchConfigAndInitFirebase();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #FFFFFF;
            --text-dark: #1F2937;
            --text-muted: #6B7280;
            --accent-orange: #FF6B35;
            --accent-orange-hover: #E85D2A;
            --accent-orange-disabled: #FFB39A;
            --star-gold: #FFD700;
            --star-empty: #E5E7EB;
            --border-light: #E5E7EB;
            --bg-light: #F9FAFB;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius-md: 0.5rem;
            --radius-lg: 1rem;
            --transition-speed: 300ms;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-dark);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Mobile-first App Container */
        #app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--primary-bg);
            box-shadow: var(--shadow-sm);
        }

        /* Utilities */
        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn var(--transition-speed) ease-in-out forwards;
        }

        .fade-out {
            animation: fadeOut var(--transition-speed) ease-in-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--accent-orange);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--accent-orange-hover);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn-primary:disabled {
            background-color: var(--accent-orange-disabled);
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-light);
            margin-top: 0.75rem;
        }

        .btn-secondary:hover:not(:disabled) {
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* =========================================
           Screen: Landing 
        ========================================= */
        #landing-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        #landing-screen h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        #landing-screen p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .input-group {
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .input-group input:focus {
            border-color: var(--accent-orange);
        }

        /* =========================================
           Screen: Main App
        ========================================= */
        #app-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.25rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            margin-bottom: 1rem;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0.5rem;
            margin-left: -0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-family: inherit;
        }

        .back-btn:hover {
            color: var(--text-dark);
        }

        .counter {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .image-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1.5rem;
            background-color: var(--bg-light);
            border-radius: var(--radius-lg);
            padding: 1rem;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
            min-height: 250px;
        }

        #brand-image {
            max-width: 100%;
            max-height: 40vh;
            object-fit: contain;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            background-color: white;
        }

        #admin-rating {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 500;
            min-height: 20px;
        }

        .star-container {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .star {
            font-size: 48px;
            color: var(--star-empty);
            cursor: pointer;
            user-select: none;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.2s ease, transform 0.1s ease;
        }

        .star.selected {
            color: var(--star-gold);
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.4);
        }

        .star.result-star {
            cursor: default;
        }

        .star.result-star:active {
            transform: none;
        }

        .star:not(.result-star):active {
            transform: scale(0.9);
        }

        .actions-container {
            margin-bottom: 1rem;
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-light);
            border-top-color: var(--accent-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .confirmation {
            text-align: center;
            color: #10B981;
            font-weight: 600;
            margin-top: -1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            height: 20px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .confirmation.show {
            opacity: 1;
        }

        /* =========================================
           Screen: End 
        ========================================= */
        #end-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        #end-screen h2 {
            font-size: 2rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        #end-screen p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <div id="app-container">

        <!-- Screen 1: Landing -->
        <div id="landing-screen">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🎯</div>
            <h1>Ready to play judge?</h1>
            <p>Rate each brand name from 1 to 5 stars based on your gut feeling &mdash; no overthinking! &mdash; and hit
                Submit and move on. That's it.</p>

            <div class="input-group">
                <input type="text" id="start-input" placeholder="type 'start' to begin" autocomplete="off"
                    autocorrect="off" autocapitalize="off" spellcheck="false">
            </div>

            <button id="begin-btn" class="btn btn-primary" disabled>Begin</button>
        </div>

        <!-- Screen 2: Main App -->
        <div id="app-screen" class="hidden">
            <div class="top-bar">
                <button id="back-btn" class="back-btn hidden">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7" />
                    </svg>
                    Back
                </button>
                <div id="back-spacer" style="width: 70px;"></div>
                <div class="counter" id="image-counter">0 / 0</div>
            </div>

            <div class="image-container">
                <img id="brand-image" src="" alt="Brand Name">
            </div>

            <div id="admin-rating" class="hidden">
                <!-- Populated via JS -->
            </div>

            <div class="star-container" id="star-selector">
                <span class="star" data-val="1">☆</span>
                <span class="star" data-val="2">☆</span>
                <span class="star" data-val="3">☆</span>
                <span class="star" data-val="4">☆</span>
                <span class="star" data-val="5">☆</span>
            </div>

            <div class="confirmation" id="submit-confirmation">✓ Submitted!</div>

            <div class="actions-container">
                <button id="submit-btn" class="btn btn-primary" disabled>Submit Rating</button>
                <button id="skip-btn" class="btn btn-secondary">Don't Rate</button>
            </div>
        </div>

        <!-- Screen 3: End -->
        <div id="end-screen" class="hidden">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🎉</div>
            <h2>Done.</h2>
            <p>Thank you for participating!</p>
        </div>

        <!-- Global Loading Overlay -->
        <div id="loading-overlay" class="hidden">
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        // --- Application State ---
        let startInputUser = "";
        let isAdmin = false;

        // Images array
        let imagesList = [];
        let currentIndex = 0; // 0-based indexing for imagesList

        // User interaction 
        let currentRatingSelected = 0;

        // Database State
        let currentDbAggregate = 0;
        let currentDbRaters = 0;

        // --- DOM Elements ---
        const sLanding = document.getElementById('landing-screen');
        const sApp = document.getElementById('app-screen');
        const sEnd = document.getElementById('end-screen');

        const inputStart = document.getElementById('start-input');
        const btnBegin = document.getElementById('begin-btn');

        const uiTotalCounter = document.getElementById('image-counter');
        const btnBack = document.getElementById('back-btn');
        const backSpacer = document.getElementById('back-spacer');
        const elImage = document.getElementById('brand-image');

        const elAdminRow = document.getElementById('admin-rating');
        const stars = document.querySelectorAll('.star');
        const btnSubmit = document.getElementById('submit-btn');
        const btnSkip = document.getElementById('skip-btn');
        const elConfirmation = document.getElementById('submit-confirmation');

        const uiLoading = document.getElementById('loading-overlay');

        // --- Utilities ---
        function showLoading() { uiLoading.classList.remove('hidden'); }
        function hideLoading() { uiLoading.classList.add('hidden'); }

        function switchScreen(hideEl, showEl) {
            hideEl.classList.remove('fade-in');
            hideEl.classList.add('fade-out');

            setTimeout(() => {
                hideEl.classList.add('hidden');
                hideEl.classList.remove('fade-out');

                showEl.classList.remove('hidden');
                showEl.classList.add('fade-in');
            }, 300);
        }

        // Extract `name_id` from filename (e.g. "nameABC.png" -> "ABC")
        // Note: requirements say filename is "name" + 3 characters. 
        function getNameIdFromFilename(filename) {
            // Remove .png using split or substring
            const pureName = filename.split('.')[0];
            if (pureName.startsWith('name')) {
                return pureName.substring(4); // 3 characters after "name"
            }
            return pureName; // Fallback
        }

        // --- Landing Logic ---
        inputStart.addEventListener('input', (e) => {
            startInputUser = e.target.value.toLowerCase().trim();
            if (startInputUser === 'start' || startInputUser === 'admin0') {
                btnBegin.disabled = false;
            } else {
                btnBegin.disabled = true;
            }
        });

        btnBegin.addEventListener('click', async () => {
            if (startInputUser === 'admin0') isAdmin = true;

            showLoading();

            try {
                // First fetch the images list to know the sequence
                const res = await fetch('/api/images');
                const data = await res.json();

                if (!data.images || data.images.length === 0) {
                    alert("No images found in /assets. Cannot start application.");
                    hideLoading();
                    return;
                }

                imagesList = data.images;

                if (isAdmin && window.db && window.firebaseModules) {
                    // Sort images by rating for admins
                    try {
                        const { collection, getDocs } = window.firebaseModules;
                        const querySnapshot = await getDocs(collection(window.db, "name_ratings"));

                        const ratingMap = {};
                        querySnapshot.forEach((docSnap) => {
                            const data = docSnap.data();
                            const aggr = data.rating_aggregate || 0;
                            const count = data.raters_number || 0;
                            ratingMap[docSnap.id] = count > 0 ? (aggr / count) : 0;
                        });

                        imagesList.sort((a, b) => {
                            const idA = getNameIdFromFilename(a);
                            const idB = getNameIdFromFilename(b);
                            const avgA = ratingMap[idA] || 0;
                            const avgB = ratingMap[idB] || 0;

                            if (avgB === avgA) {
                                return a.localeCompare(b); // fallback to alphabetically
                            }
                            return avgB - avgA; // descending
                        });
                    } catch (err) {
                        console.error("Failed to sort by rating:", err);
                    }
                }

                // Proceed to App flow
                hideLoading();
                switchScreen(sLanding, sApp);

                // Start loading first image
                loadItemAtCursor(0);

            } catch (error) {
                console.error("Failed to load images", error);
                alert("Failed to initialize app.");
                hideLoading();
            }
        });

        // --- Main App Flow ---
        async function loadItemAtCursor(index) {
            if (index >= imagesList.length) {
                // Reached the end
                switchScreen(sApp, sEnd);
                return;
            }

            showLoading();
            currentIndex = index;

            // Admin View adjustments
            if (isAdmin) {
                btnSubmit.classList.add('hidden');
                btnSkip.textContent = "Next";
                // We'll update stars directly based on DB response instead of user input
            } else {
                updateStarsUI();
            }

            if (currentIndex === 0) {
                btnBack.classList.add('hidden');
                backSpacer.classList.remove('hidden');
            } else {
                btnBack.classList.remove('hidden');
                backSpacer.classList.add('hidden');
            }

            uiTotalCounter.textContent = `${currentIndex + 1} / ${imagesList.length}`;

            // Bind load handlers before setting src to avoid race conditions
            let loaded = false;
            const finishLoad = () => {
                if (!loaded) {
                    loaded = true;
                    hideLoading();
                }
            };

            elImage.onload = finishLoad;
            elImage.onerror = finishLoad; // Even if it breaks, hide spinner

            // Safety fallback if image is cached and onload doesn't fire
            setTimeout(finishLoad, 2000);

            // Set Image Src
            const filename = imagesList[currentIndex];
            elImage.src = `/assets/${filename}`;

            // Check if natively cached and complete already
            if (elImage.complete) {
                finishLoad();
            }

            // Default DB state (Reset)
            currentDbAggregate = 0;
            currentDbRaters = 0;
            elAdminRow.innerHTML = "Loading rating...";

            if (isAdmin) {
                elAdminRow.classList.remove('hidden');
            } else {
                elAdminRow.classList.add('hidden');
            }

            // Only attempt to read Firebase if it initialized correctly
            const nameId = getNameIdFromFilename(filename);

            if (window.db && window.firebaseModules) {
                try {
                    const { doc, getDoc, setDoc } = window.firebaseModules;
                    const docRef = doc(window.db, "name_ratings", nameId);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        currentDbAggregate = data.rating_aggregate || 0;
                        currentDbRaters = data.raters_number || 0;
                    } else {
                        // Initialize empty record in database if missing
                        try {
                            await setDoc(docRef, {
                                name_id: nameId,
                                rating_aggregate: 0,
                                raters_number: 0
                            });
                        } catch (setErr) {
                            console.warn("Could not auto-initialize record:", setErr);
                        }
                        currentDbAggregate = 0;
                        currentDbRaters = 0;
                    }
                } catch (error) {
                    console.error("Error reading from Firestore:", error);
                }
            } else {
                console.warn("Firebase not ready. Using default 0s.");
            }

            // Update Admin Text & Stars
            if (isAdmin) {
                let avg = 0;
                if (currentDbRaters === 0) {
                    elAdminRow.innerHTML = `Current rating: 0.0 ★ (${currentDbRaters} ratings)`;
                } else {
                    avg = currentDbAggregate / currentDbRaters;
                    elAdminRow.innerHTML = `Current rating: ${avg.toFixed(1)} ★ (${currentDbRaters} ratings)`;
                }

                // Render fractional stars
                stars.forEach((s, idx) => {
                    const starVal = idx + 1;
                    if (avg >= starVal) {
                        // Full
                        s.className = 'star selected result-star';
                        s.style.background = 'none';
                        s.style.webkitTextFillColor = 'initial';
                        s.textContent = '★';
                    } else if (avg > starVal - 1) {
                        // Partial
                        const fraction = avg - (starVal - 1);
                        const percent = fraction * 100;
                        s.className = 'star result-star';
                        s.textContent = '★'; // We use the filled unicode shape but color it partially

                        s.style.background = `linear-gradient(90deg, var(--star-gold) ${percent}%, var(--star-empty) ${percent}%)`;
                        s.style.backgroundClip = 'text';
                        s.style.webkitBackgroundClip = 'text';
                        s.style.webkitTextFillColor = 'transparent';
                    } else {
                        // Empty
                        s.className = 'star result-star';
                        s.style.background = 'none';
                        s.style.webkitTextFillColor = 'initial';
                        s.textContent = '☆';
                    }
                });
            }

        }

        // --- Star Logic ---
        stars.forEach(s => {
            s.addEventListener('click', (e) => {
                if (isAdmin) return; // Admins don't input ratings this way
                currentRatingSelected = parseInt(e.target.dataset.val);
                updateStarsUI();
                btnSubmit.disabled = false;
            });
        });

        function updateStarsUI() {
            stars.forEach(s => {
                const val = parseInt(s.dataset.val);
                if (val <= currentRatingSelected) {
                    s.textContent = '★';
                    s.classList.add('selected');
                } else {
                    s.textContent = '☆';
                    s.classList.remove('selected');
                }
            });
        }

        // --- Actions ---
        btnSkip.addEventListener('click', () => {
            loadItemAtCursor(currentIndex + 1);
        });

        btnBack.addEventListener('click', () => {
            if (currentIndex > 0) {
                loadItemAtCursor(currentIndex - 1);
            }
        });

        btnSubmit.addEventListener('click', async () => {
            if (currentRatingSelected === 0) return;

            // Block UI clicks
            btnSubmit.disabled = true;
            btnSkip.disabled = true;
            btnBack.disabled = true;

            // Logic
            const filename = imagesList[currentIndex];
            const nameId = getNameIdFromFilename(filename);

            const newAgg = currentDbAggregate + currentRatingSelected;
            const newRaters = currentDbRaters + 1;

            let success = true;

            // Save to Firebase
            if (window.db && window.firebaseModules) {
                try {
                    const { doc, setDoc } = window.firebaseModules;
                    const docRef = doc(window.db, "name_ratings", nameId);

                    // Write back. Merge ensures we don't overwrite unexpected future fields
                    await setDoc(docRef, {
                        name_id: nameId,
                        rating_aggregate: newAgg,
                        raters_number: newRaters
                    }, { merge: true });

                    // Update our local state so going "Back" reflects recent change if needed
                    // Note: The prompt doesn't explicitly require reflecting changes immediately if going back

                } catch (error) {
                    console.error("Error writing to Firestore:", error);
                    success = false;
                }
            } else {
                console.warn("Firebase not ready. Rating not saved.");
                // We simulate success since user might be testing without DB
            }

            if (!success) {
                alert("Failed to connect to database. Please check your internet connection.");
                btnSubmit.disabled = false;
                btnSkip.disabled = false;
                btnBack.disabled = false;
                return;
            }

            // Show checkmark
            elConfirmation.classList.add('show');

            // Wait 2.0s, then proceed
            setTimeout(() => {
                loadItemAtCursor(currentIndex + 1);
            }, 2000);
        });

    </script>
</body>

</html>
